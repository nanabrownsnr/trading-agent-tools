<div id="chart" style="width:100%;height:420px;"></div>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script type="importmap">
{
  "imports": {
    "@modelcontextprotocol/ext-apps": "https://unpkg.com/@modelcontextprotocol/ext-apps"
  }
}
</script>
<script type="module">
    import { App } from "@modelcontextprotocol/ext-apps";
    const app = new App({ name: "graph-mcp-line-chart", version: "1.0.0" });
    // Register handlers before connect(), per the official docs
    app.ontoolresult = (result) => {
        const figure = result.structuredContent?.figure;
        if (figure) Plotly.newPlot("chart", figure.data, figure.layout, { responsive: true });
    };
    app.connect();
</script>
